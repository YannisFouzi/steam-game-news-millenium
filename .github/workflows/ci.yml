name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plugin:
    name: Plugin (build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # `millennium-ttc --build prod` bundle frontend + webkit (charge tsconfig,
      # echoue si erreur de type ou de bundling). Pas de tests unitaires sur cette
      # surface — le build est la garde minimale contre une regression.
      - name: Build plugin
        run: npm run build
